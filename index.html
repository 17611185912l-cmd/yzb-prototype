<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>优坐标教师原型在线预览</title>
  <style>html,body,iframe{width:100%;height:100%;margin:0;border:0;overflow:hidden}</style>
</head>
<body>
  <iframe id="prototypeFrame" title="优坐标教师原型" src="./优坐标老师列表新版移动端改版_在线预览.html"></iframe>
  <script>
    const frame = document.getElementById('prototypeFrame');
    frame.addEventListener('load', () => {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const syncParentRoute = () => {
        if (window.location.hash !== win.location.hash) window.location.hash = win.location.hash;
      };
      const syncFrameRoute = () => {
        if (window.location.hash && win.location.hash !== window.location.hash) win.location.hash = window.location.hash;
      };
      win.addEventListener('hashchange', syncParentRoute);
      window.addEventListener('hashchange', syncFrameRoute);
      syncFrameRoute();
      syncParentRoute();
      const maxVisibleAds = 3;
      const maxAdSlots = 10;
      const rows = () => [...doc.querySelectorAll('#suitableChildRows tr')];
      const shown = () => rows().filter(row => row.querySelector('select')?.value === '展示').length;
      const showToast = message => {
        if (typeof win.showPrototypeToast === 'function') {
          win.showPrototypeToast(message);
          return;
        }
        let toast = doc.getElementById('prototypeToast');
        if (!toast) {
          toast = doc.createElement('div');
          toast.id = 'prototypeToast';
          toast.style.cssText = 'position:fixed;z-index:1000;left:50%;bottom:42px;max-width:calc(100vw - 32px);padding:11px 16px;border-radius:8px;background:rgba(23,35,55,.92);box-shadow:0 8px 24px rgba(15,23,42,.2);color:#fff;font-size:14px;line-height:1.45;transform:translateX(-50%);';
          doc.body.append(toast);
        }
        toast.textContent = message;
        win.clearTimeout(win.prototypeToastTimer);
        win.prototypeToastTimer = win.setTimeout(() => toast.remove(), 2600);
      };
      const hint = () => doc.getElementById('suitableChildHint');
      if (!hint()) {
        const message = doc.createElement('div');
        message.className = 'hint';
        message.id = 'suitableChildHint';
        doc.getElementById('addSuitableChild')?.before(message);
      }
      const sync = (message = '') => {
        const add = doc.getElementById('addSuitableChild');
        if (add) add.disabled = rows().length >= maxAdSlots;
        if (hint()) hint().textContent = message || (rows().length >= maxAdSlots
          ? `最多可新增${maxAdSlots}条数据，建议删除后再新增。`
          : `当前共 ${rows().length} 条广告位，其中 ${shown()} 条展示中；广告位总数最多 ${maxAdSlots} 条，前台最多展示 ${maxVisibleAds} 条。`);
      };
      const openView = () => {
        win.showPage('admin-teachers');
        win.openTeacherModal('view');
        const modal = doc.getElementById('teacherConfigModal');
        modal.classList.add('is-view');
        modal.querySelectorAll('.modal-shell input,.modal-shell select,.modal-shell textarea').forEach(el => el.disabled = true);
        modal.querySelectorAll('.modal-shell button:not(.modal-top-tab)').forEach(el => el.disabled = true);
        doc.getElementById('saveTeacherDisplayData').hidden = true;
        modal.querySelector('.modal-foot [data-close-teacher-modal]').textContent = '关闭';
      };
      const navTree = doc.querySelector('[data-page="admin-teachers"]')?.closest('.nav-tree');
      if (navTree && !doc.querySelector('[data-page="admin-teacher-view-modal"]')) {
        const button = doc.createElement('button');
        button.className = 'nav-btn child';
        button.dataset.page = 'admin-teacher-view-modal';
        button.textContent = '查看教师详情弹窗';
        navTree.querySelector('.nav-children')?.append(button);
      }
      doc.addEventListener('click', event => {
        const target = event.target.closest('[data-page="admin-teacher-view-modal"],[data-open-teacher-modal="view"]');
        if (target) {
          event.preventDefault();
          event.stopImmediatePropagation();
          openView();
          return;
        }
        if (event.target.closest('#addSuitableChild') && rows().length >= maxAdSlots) {
          event.preventDefault();
          event.stopImmediatePropagation();
          sync(`最多可新增${maxAdSlots}条数据，建议删除后再新增。`);
          return;
        }
        const remove = event.target.closest('#suitableChildRows .link-btn.danger');
        if (remove && rows().length <= 1) {
          event.preventDefault();
          event.stopImmediatePropagation();
          sync('至少保留 1 个广告位，不能继续删除。');
        }
      }, true);
      doc.addEventListener('change', event => {
        const select = event.target.closest('#suitableChildRows select');
        if (!select) return;
        if (select.value === '展示' && shown() > maxVisibleAds) {
          select.value = '隐藏';
          sync(`前台最多展示 ${maxVisibleAds} 条广告位，请先隐藏其他广告位后再展示。`);
          showToast(`前台最多展示 ${maxVisibleAds} 条广告位，请先隐藏其他广告位后再展示。`);
          return;
        }
        sync();
      }, true);
      doc.getElementById('suitableChildRows')?.addEventListener('click', () => setTimeout(sync));
      sync();
    });
  </script>
</body>
</html>
